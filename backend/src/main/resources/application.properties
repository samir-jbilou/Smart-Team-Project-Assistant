spring.application.name=backend

# La base de donnÈes
spring.datasource.url=jdbc:postgresql://db.bgqanqwqevuhrabpkrtc.supabase.co:5432/postgres
spring.datasource.username=postgres
# On ne met plus le mot de passe ici ! On appelle la variable DB_PASSWORD
spring.datasource.password=${DB_PASSWORD}

server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.main.banner-mode=CONSOLE

# Le JWT
# On ne met plus la clÈ ici ! On appelle la variable JWT_SECRET
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000